<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORLD CLICK WAR</title>
    <style>
        :root {
            --bg: #000000; --accent: #ffffff; --muted: #666666; --border: #1c1c1e;
            --panel: #0a0a0c; --green: #00ff66;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: "SF Mono", Consolas, monospace;
        }
        [data-theme="light"] {
            --bg: #ffffff; --accent: #000000; --muted: #86868b; --border: #e5e5ea;
            --panel: #f5f5f7; --green: #14803b;
        }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--accent);
            font-family: var(--font); overflow-x: hidden; transition: background 0.2s;
            display: flex; justify-content: center; min-height: 100vh;
        }
        .app-container {
            width: 100%; max-width: 440px; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 24px; border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative; background: var(--bg);
        }
        header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .logo-zone h1 { font-size: 14px; font-weight: 600; letter-spacing: 2px; margin: 0 0 4px 0; }
        .season-badge { font-family: var(--font-mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }
        .online-count { font-family: var(--font-mono); font-size: 16px; font-weight: bold; }
        .online-pulse { display: inline-block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; margin-left: 4px; box-shadow: 0 0 8px var(--green); }
        
        .event-banner {
            background: var(--accent); color: var(--bg); text-align: center; padding: 8px; font-size: 11px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; border-radius: 6px; margin: 16px 0 8px 0; display: none;
        }
        .leaderboard { flex-grow: 1; margin: 16px 0; overflow-y: auto; max-height: calc(100vh - 420px); padding-right: 4px; }
        .leaderboard::-webkit-scrollbar { width: 4px; }
        .leaderboard::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .row.current-user { font-weight: 600; color: var(--green); }
        .row-left { display: flex; align-items: center; gap: 8px; }
        .rank { font-family: var(--font-mono); color: var(--muted); width: 26px; font-size: 12px; }
        .row-right { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); }
        .speed-indicator { font-size: 11px; color: var(--green); opacity: 0.8; }

        .live-feed-container { height: 32px; overflow: hidden; position: relative; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .live-feed { display: flex; gap: 16px; position: absolute; white-space: nowrap; }
        .feed-item { font-size: 12px; font-family: var(--font-mono); color: var(--muted); background: var(--panel); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }

        .control-panel { border-top: 1px solid var(--border); padding-top: 16px; text-align: center; }
        .active-country-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
        .click-box { position: relative; display: inline-block; margin-bottom: 16px; }
        
        #click-btn {
            width: 130px; height: 130px; border-radius: 50%; background: var(--bg); border: 2px solid var(--accent);
            color: var(--accent); font-size: 15px; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: transform 0.05s;
        }
        #click-btn:active { transform: scale(0.94); }
        #click-btn.premium-active { background: var(--accent); color: var(--bg); box-shadow: 0 0 30px rgba(255,255,255,0.15); }

        .particle { position: absolute; pointer-events: none; font-family: var(--font-mono); font-weight: bold; animation: floatParticle 0.5s ease-out forwards; left: 50%; }
        @keyframes floatParticle { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -60px); opacity: 0; } }

        .timer-val { color: var(--accent); font-weight: 600; font-size: 14px; margin-top: 2px; font-family: var(--font-mono); }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; padding: 40px 24px; }
        .search-box { background: var(--panel); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: var(--accent); width: 100%; font-size: 15px; margin-bottom: 16px; }
        .country-select-list { flex-grow: 1; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
        .select-row { display: flex; justify-content: space-between; padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 15px; }
        .select-row:hover { background: var(--panel); }
        .hidden { display: none !important; }
        .nav-links { display: flex; justify-content: center; gap: 16px; margin-top: 16px; font-size: 12px; color: var(--muted); cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- ОКНО ВЫБОРА СТРАНЫ С ПОИСКОМ -->
        <div id="welcome-modal" class="modal hidden">
            <h2 style="font-weight:400; margin-bottom:10px; font-size:20px;">Select Country / Выберите страну</h2>
            <input type="text" id="search-input" class="search-box" placeholder="Type country name to search...">
            <div class="country-select-list" id="select-list"></div>
        </div>

        <!-- ОПЦИИ -->
        <div id="settings-modal" class="modal hidden">
            <h2 style="font-weight:400;">Options</h2>
            <div style="flex-grow:1;">
                <button class="search-box" style="text-align:left;" onclick="toggleTheme()">🌓 Switch Theme</button>
                <button class="search-box" style="text-align:left;" onclick="resetCountry()">🌍 Change Country</button>
                <div style="border: 1px dashed var(--border); padding: 20px; border-radius: 8px; text-align: center; margin-top:30px;">
                    <h3 style="margin:0 0 8px 0; font-weight:500;">❤️ Supporter Upgrade</h3>
                    <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">Unlock permanent x5 multiplier for your country.</p>
                    <div id="memo-box" style="background:var(--panel); padding:8px; font-family:var(--font-mono); margin-bottom:12px; border-radius:4px;">GENERATING...</div>
                    <button class="search-box" style="background:var(--accent); color:var(--bg); font-weight:600; margin:0;" onclick="simulatePayment()">Activate x5 Boost ($0.10)</button>
                </div>
            </div>
            <button class="search-box" style="background:none;" onclick="document.getElementById('settings-modal').classList.add('hidden')">Close</button>
        </div>

        <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
        <header>
            <div class="logo-zone">
                <h1>WORLD CLICK WAR</h1>
                <span class="season-badge" id="season-badge">SEASON 1</span>
            </div>
            <div class="online-status">
                <div class="online-count" id="online-val">0<span class="online-pulse"></span></div>
            </div>
        </header>

        <div class="event-banner" id="event-banner"></div>
        <div class="leaderboard" id="leaderboard-box"></div>

        <div class="live-feed-container">
            <div class="live-feed" id="live-ticker"></div>
        </div>

        <div class="control-panel">
            <div class="active-country-info" id="user-status">Fighting for --</div>
            <div class="click-box">
                <button id="click-btn">CLICK</button>
            </div>
            <div class="timer-zone">
                <div style="font-size:10px; letter-spacing:1px;">NEXT SEASON IN</div>
                <div class="timer-val" id="countdown">00:00:00</div>
            </div>
            <div class="nav-links"><span onclick="openSettings()">💎 Options & Boost</span></div>
        </div>
    </div>

            {code:"UA", name:"Ukraine", flag:"🇺🇦"}, {code:"AE", name:"United Arab Emirates", flag:"🇦🇪"}, {code:"GB", name:"United Kingdom", flag:"🇬🇧"}, {code:"US", name:"United States", flag:"🇺🇸"},
            {code:"UY", name:"Uruguay", flag:"🇺🇾"}, {code:"UZ", name:"Uzbekistan", flag:"🇺🇿"}, {code:"VU", name:"Vanuatu", flag:"🇻🇺"}, {code:"VE", name:"Venezuela", flag:"🇻🇪"},
            {code:"VN", name:"Vietnam", flag:"🇻🇳"}, {code:"YE", name:"Yemen", flag:"🇾🇪"}, {code:"ZM", name:"Zambia", flag:"🇿🇲"}, {code:"ZW", name:"Zimbabwe", flag:"🇿🇼"}
        ];

        let ws;
        let serverCountries = [];
        let userCountry = localStorage.getItem("war_country");
        let isPremium = localStorage.getItem("war_premium") === "true";
        
        let localClickBuffer = [];
        let packetInterval = null;

        const leaderboardBox = document.getElementById("leaderboard-box");
        const clickBtn = document.getElementById("click-btn");
        const ticker = document.getElementById("live-ticker");

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === "INIT" || msg.type === "TICK") {
                    serverCountries = msg.countries;
                    document.getElementById("online-val").innerHTML = `${msg.online.toLocaleString()}<span class="online-pulse"></span>`;
                    updateTimer(msg.seasonTime);
                    handleEventBanner(msg.event);
                    renderLeaderboard();
                }
                
                if (msg.type === "LIVE_FEED_EVENT") {
                    pushToTicker(msg.country);
                }

                if (msg.type === "PREMIUM_ACTIVATED" && msg.memo === localStorage.getItem("payment_memo")) {
                    activatePremium();
                }
            };

            ws.onclose = () => setTimeout(connect, 2000);
        }

        function renderLeaderboard() {
            leaderboardBox.innerHTML = '';
            
            // Сортируем страны по очкам на сервере
            serverCountries.sort((a,b) => b.score - a.score);
            
            serverCountries.forEach((c, index) => {
                const isMe = c.code === userCountry;
                const row = document.createElement("div");
                row.className = `row ${isMe ? 'current-user' : ''}`;
                
                let rankVisual = index + 1;
                if(rankVisual === 1) rankVisual = "🥇";
                else if(rankVisual === 2) rankVisual = "🥈";
                else if(rankVisual === 3) rankVisual = "🥉";

                row.innerHTML = `
                    <div class="row-left"><span class="rank">${rankVisual}</span><span>${c.flag} ${c.name}</span></div>
                    <div class="row-right"><span>${c.score.toLocaleString()}</span><span class="speed-indicator">+${c.lastSpeed}/s</span></div>
                `;
                leaderboardBox.appendChild(row);
            });
        }

        clickBtn.onclick = () => {
            if (!userCountry) return;
            
            const match = serverCountries.find(c => c.code === userCountry);
            if(match) { 
                match.score += (isPremium ? 5 : 1); 
                renderLeaderboard(); 
            }

            localClickTimelinePush();

            const p = document.createElement("div");
            p.className = "particle";
            p.innerText = isPremium ? "+5 🔥" : "+1";
            p.style.top = `20px`;
            document.querySelector(".click-box").appendChild(p);
            setTimeout(() => p.remove(), 500);
        };

        function localClickTimelinePush() {
            localClickBuffer.push(Date.now());
            if(!packetInterval) {
                packetInterval = setTimeout(() => {
                    if(ws.readyState === 1 && localClickBuffer.length > 0) {
                        const staticData = ALL_COUNTRIES.find(c => c.code === userCountry) || {};
                        ws.send(JSON.stringify({
                            type: "CLICK_PACKET",
                            country: userCountry,
                            countryName: staticData.name,
                            countryFlag: staticData.flag,
                            timestamps: localClickBuffer,
                            isPremiumUser: isPremium
                        }));
                    }
                    localClickBuffer = [];
                    packetInterval = null;
                }, 1000);
            }
        }

        function pushToTicker(code) {
            const staticData = ALL_COUNTRIES.find(c => c.code === code);
            if (!staticData) return;
            const item = document.createElement("div");
            item.className = "feed-item";
            item.innerText = `${staticData.flag} ${code} CLICKED!`;
            ticker.appendChild(item);
            if(ticker.children.length > 5) ticker.children[0].remove();
        }

        function handleEventBanner(ev) {
            const el = document.getElementById("event-banner");
            if(ev) { el.innerText = ev.text; el.style.display = "block"; } else { el.style.display = "none"; }
        }

        function updateTimer(secs) {
            const hrs = Math.floor(secs / 3600).toString().padStart(2, '0');
            const mins = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            document.getElementById("countdown").innerText = `${hrs}:${mins}:${s}`;
        }

        // ПОИСК И ФИЛЬТРАЦИЯ СТРАН НА КЛИЕНТЕ
        function buildSelectionList() {
            const listEl = document.getElementById("select-list");
            const searchInput = document.getElementById("search-input");
            
            const render = (filteredArray) => {
                listEl.innerHTML = '';
                filteredArray.forEach(c => {
                    const d = document.createElement("div"); 
                    d.className = "select-row";
                    d.innerHTML = `<span>${c.flag} &nbsp; ${c.name}</span><span style="color:var(--muted); font-size:12px;">${c.code}</span>`;
                    d.onclick = () => {
                        userCountry = c.code; 
                        localStorage.setItem("war_country", c.code);
                        document.getElementById("welcome-modal").classList.add("hidden");
                        initGameInterface();
                    };
                    listEl.appendChild(d);
                });
            };

            // Первичный рендеринг всех стран
            render(ALL_COUNTRIES);

            // Обработчик ввода в поисковую строку
            searchInput.oninput = (e) => {
                const query = e.target.value.toLowerCase().trim();
                const filtered = ALL_COUNTRIES.filter(item => 
                    item.name.toLowerCase().includes(query) || 
                    item.code.toLowerCase().includes(query)
                );
                render(filtered);
            };
        }

        if (!userCountry) {
            document.getElementById("welcome-modal").classList.remove("hidden");
            buildSelectionList();
        } else {
            initGameInterface();
        }

        function initGameInterface() {
            const currentCountryObj = ALL_COUNTRIES.find(c => c.code === userCountry);
            const printableName = currentCountryObj ? `${currentCountryObj.flag} ${currentCountryObj.name}` : userCountry;
            document.getElementById("user-status").innerText = `Fighting for ${printableName}`;
            if(isPremium) clickBtn.classList.add("premium-active");
            connect();
        }

        function openSettings() {
            document.getElementById("settings-modal").classList.remove("hidden");
            if(!localStorage.getItem("payment_memo")) {
                localStorage.setItem("payment_memo", 'WAR-' + Math.random().toString(36).substring(2, 7).toUpperCase());
            }
            document.getElementById("memo-box").innerText = localStorage.getItem("payment_memo");
        }

        function simulatePayment() {
            fetch('/api/webhook/payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ memo: localStorage.getItem("payment_memo"), amount: 0.10 })
            }).then(() => alert("Boost activated dynamically via webhook!"));
        }

        function activatePremium() {
            isPremium = true; 
            localStorage.setItem("war_premium", "true");
            clickBtn.classList.add("premium-active");
            document.getElementById("settings-modal").classList.add("hidden");
            initGameInterface();
        }

        function toggleTheme() {
            const t = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
            if(t === "light") document.documentElement.setAttribute("data-theme", "light");
            else document.documentElement.removeAttribute("data-theme");
            localStorage.setItem("theme", t);
        }

        function resetCountry() {
            localStorage.removeItem("war_country");
            window.location.reload();
        }
    </script>
</body>
</html>
